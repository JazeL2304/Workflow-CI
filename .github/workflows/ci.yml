name: MLflow CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          ls mlruns/0 | tail -n 1

      - name: Upload artefak ke repo
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/mlruns/

- name: Build Docker Model
        run: |
          cd MLProject
          RUN_ID=$(ls -t mlruns/0 | grep -v yaml | head -n 1)
          python -c "
          import mlflow.models
          mlflow.models.build_docker(model_uri='runs:/${RUN_ID}/model', name='jazel2304/msml-covid-model', env_manager='virtualenv', base_image='python:3.11-slim')
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag jazel2304/msml-covid-model jazel2304/msml-covid-model:latest

      - name: Push Docker Image
        run: docker push jazel2304/msml-covid-model:latest