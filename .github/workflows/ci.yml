name: MLflow CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          # Ambil run terbaru dari experiment default ('0')
          runs = client.search_runs(experiment_ids=['0'], order_by=['attribute.start_time DESC'], max_results=1)
          if runs:
              print(runs[0].info.run_id)
          else:
              raise Exception('Tidak ada MLflow run yang ditemukan!')
          ")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest RUN_ID: $RUN_ID"

      - name: Upload artefak ke repo
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/mlruns/

      - name: Build Docker Model
        env:
          RUN_ID: ${{ steps.get_run_id.outputs.run_id }}
        run: |
          cd MLProject
          python -c "
          import os, mlflow.models
          run_id = os.environ['RUN_ID']
          mlflow.models.build_docker(
              model_uri=f'runs:/{run_id}/model',
              name='jazel2304/msml-covid-model',
              env_manager='local',
              base_image='python:3.12-slim'
          )
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag jazel2304/msml-covid-model:latest jazel2304/msml-covid-model:latest

      - name: Push Docker Image
        run: docker push jazel2304/msml-covid-model:latest